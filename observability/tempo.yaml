# Grafana Tempo — single-binary lab config (minimal, schema-portable).
#
# NOTE: trimmed to the fields the current Tempo image accepts. Earlier versions
# took top-level `ingester:` and `compactor:` blocks; newer Tempo restructured
# them, so they're removed here and Tempo uses sensible defaults for both. The
# fields below (server, distributor/OTLP receivers, storage) are stable.
#
# If you ever want the old fast-flush tuning back, pin the image to a 2.x tag
# (e.g. grafana/tempo:2.6.1) and you can re-add ingester/compactor blocks.

stream_over_http_enabled: true

server:
  http_listen_port: 3200          # Grafana queries traces here

usage_report:
  reporting_enabled: false        # no phone-home; keep the lab self-contained

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317  # ContextForge sends OTLP/gRPC here
        http:
          endpoint: 0.0.0.0:4318

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks